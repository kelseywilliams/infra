apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: droplet

# Local overlay: the environment-agnostic base services plus this cluster's
# sealed secrets. Deploy with:  kubectl apply -k overlays/local
resources:
  - ../../base
  - secrets/postgres-secrets.sealed.yaml
  - secrets/redis-secrets.sealed.yaml
  - secrets/api-secrets.sealed.yaml
  # Local routing: path-based (localhost/api/* -> api:3028). Prod uses host-based
  # (api.kelseywilliams.co) in overlays/prod, authored in the TLS phase.
  - gateway/gateway.yaml
  - gateway/httproute-api.yaml