apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: gatewayclass.yaml is intentionally NOT listed here. GatewayClass is cluster-scoped,
# and the overlay's `namespace: droplet` transformer would wrongly stamp a namespace onto it
# (rejected by the API server). It is applied directly by the start script alongside the
# Envoy Gateway install. Only the namespaced Gateway + HTTPRoute belong in the kustomize flow.
resources:
  - gateway.yaml
  - httproute-api.yaml
