apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: droplet-gateway
  namespace: droplet
  labels:
    app.kubernetes.io/part-of: droplet
spec:
  gatewayClassName: envoy
  # Applying this makes Envoy Gateway provision a LoadBalancer Service; k3d's serverlb
  # already maps host :80 -> that Service (k3d-config ports 80:80). TLS (:443) is a later phase.
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
