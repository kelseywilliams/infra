apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: droplet
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: droplet
spec:
  parentRefs:
    - name: droplet-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      # Strip the /api prefix so the backend sees /healthz, not /api/healthz
      # (equivalent to the old nginx `proxy_pass http://api:3028/` trailing-slash behavior).
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: api
          port: 3028
