apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: droplet
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: droplet
    app.kubernetes.io/component: cache
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: droplet
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999       # redis uid in the official image (verify if it ever fails to start)
        fsGroup: 999         # grants the pod group ownership of the mounted data volume
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: redis
              containerPort: 6379
          # The image entrypoint prepends `redis-server` when the first arg ends in .conf,
          # so this runs: redis-server /etc/redis/redis.conf  (entrypoint preserved).
          args: ["/etc/redis/redis.conf"]
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis/redis.conf
              subPath: redis.conf
              readOnly: true
            - name: redis-acl
              mountPath: /etc/redis/users.acl
              subPath: users.acl
              readOnly: true
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"   # headroom above maxmemory for fork copy-on-write during saves
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-acl
          secret:
            secretName: redis-secrets
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
