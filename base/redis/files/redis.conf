# Network
# listen on all interfaces; other pods reach redis via the Service
bind * -::*
port 6379
# protected-mode off is safe here: ACL auth is required and the Service is cluster-internal
protected-mode no
tcp-keepalive 300

# Logging (k8s captures stdout)
loglevel notice
logfile ""

# Auth: per-service users with scoped permissions
aclfile /etc/redis/users.acl

# Persistence (PVC mounted at /data)
dir /data
# AOF: ~1s worst-case loss for the job queue
appendonly yes
appendfsync everysec
# RDB snapshots too
save 3600 1 300 100 60 10000

# Memory: fit the container; never drop job keys (BullMQ requires noeviction)
maxmemory 200mb
maxmemory-policy noeviction
