apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Applied to every resource AND to the generated ConfigMap below, so the
# generated ConfigMap lands in the right namespace too.
namespace: droplet

resources:
  - statefulset.yaml
  - service.yaml
  - pvc.yaml
  - networkpolicy.yaml

configMapGenerator:
  - name: postgres-config
    files:
      - files/postgresql.conf
      - files/pg_hba.conf
      - files/01-init.sql
      - files/01-init-roles.sh
