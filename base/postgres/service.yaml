apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: droplet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: droplet
    app.kubernetes.io/component: database
spec:
  # Headless service (no cluster IP). Standard for StatefulSets: gives the
  # pod a stable DNS name and the short name "postgres" still resolves so
  # the api pod connects exactly like it did under docker-compose.
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
