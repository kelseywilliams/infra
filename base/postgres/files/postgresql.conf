# Connections
listen_addresses = '*'                       # other pods reach postgres over the pod network
max_connections = 50                         # bounded to fit the 512Mi container

# Memory  (must fit inside the container's 512Mi limit)
shared_buffers = 128MB                        # ~25% of the limit
effective_cache_size = 256MB                  # planner hint; the 4GB default assumes a dedicated host

# WAL  (lives on the 5Gi PVC alongside the data)
max_wal_size = 1GB                            # cap WAL growth so it can't fill the volume

# Auth
hba_file = '/etc/postgresql/pg_hba.conf'     # we mount pg_hba.conf here
password_encryption = scram-sha-256          # pinned; never silently fall back to md5

# Planner (PVC is SSD-backed)
random_page_cost = 1.1                        # SSDs make random reads cheap -> prefer index scans

# Logging
log_line_prefix = '%m [%p] user=%u db=%d app=%a client=%h '
