apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-api
  namespace: droplet
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: droplet
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    # Only api pods may reach Postgres on 5432. Everything else is denied by the
    # namespace-wide default-deny-ingress policy.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: 5432
