# k3d configuration file, saved as e.g. /home/me/myk3dcluster.yaml
apiVersion: k3d.io/v1alpha5 # this will change in the future as we make everything more stable
kind: Simple # internally, we also have a Cluster config, which is not yet available externally
metadata:
  name: droplet # name that you want to give to your cluster (will still be prefixed with `k3d-`)
servers: 1 # same as `--servers 1`
agents: 1 # single droplet: every node is a container on the same host, so keep nodes minimal
kubeAPI: # same as `--api-port myhost.my.domain:6445` (where the name would resolve to 127.0.0.1)
  host: "localhost" # important for the `server` setting in the kubeconfig
  hostIP: "127.0.0.1" # where the Kubernetes API will be listening on
  hostPort: "6445" # where the Kubernetes API listening port will be mapped to on your host system
image: rancher/k3s:v1.31.4-k3s1 # same as `--image rancher/k3s:v1.20.4-k3s1`
network: droplet-net
ports:
  - port: 80:80 # same as `--port '80:80@loadbalancer'`
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d: # k3d runtime settings
    wait: true # wait for cluster to be usable before returning; same as `--wait` (default: true)
    timeout: "60s" # wait timeout before aborting; same as `--timeout 60s`
    # disableLoadbalancer: false # same as `--no-lb`
    # disableImageVolume: false # same as `--no-image-volume`
    # disableRollback: false # same as `--no-Rollback`
    # loadbalancer:
    #   configOverrides:
    #     - settings.workerConnections=2048
  k3s: # options passed on to K3s itself
    extraArgs: # additional arguments passed to the `k3s server|agent` command; same as `--k3s-arg`
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
      # The API stays on 127.0.0.1 (see kubeAPI above): manage the cluster by
      # SSHing into the droplet, where the kubeconfig is local. This keeps the
      # Kubernetes API off the public internet.
      # ONLY if you need kubectl from outside the droplet (e.g. remote CI),
      # uncomment and set the droplet's public IP/domain so the API cert is
      # valid for it:
      # - arg: "--tls-san=DROPLET_PUBLIC_IP"
      #   nodeFilters:
      #     - server:*
  kubeconfig:
    updateDefaultKubeconfig: true # add new cluster to your default Kubeconfig; same as `--kubeconfig-update-default` (default: true)
    switchCurrentContext: true # also set current-context to the new cluster's context; same as `--kubeconfig-switch-context` (default: true)
